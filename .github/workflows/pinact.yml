name: Pinact
on:
  pull_request:
    paths:
      - .github/workflows/*.yml
      - ./docs/book/src/cronjob-tutorial/testdata/project/.github/workflows/*.yml
      - ./docs/book/src/multiversion-tutorial/testdata/project/.github/workflows/*.yml
      - ./docs/book/src/getting-started/testdata/project/.github/workflows/*.yml
      - ./pkg/plugins/golang/v4/scaffolds/internal/templates/github/*.go
      - ./pkg/plugins/optional/autoupdate/v1alpha/scaffolds/internal/github/*.go
      - ./pkg/plugins/optional/helm/*/scaffolds/internal/templates/github/*.go
      - ./testdata/*/.github/workflows/*.yml
jobs:
  pinact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install aqua
        uses: aquaproj/aqua-installer@36dc5833b04eb63f06e3bb818aa6b7a6e6db99a9 # v2.1.2
        with:
          aqua_version: v2.9.0
      
      - name: Pin actions
        uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          skip_push: "true"
          review: "false"
          includes: |
            .github/workflows/*.yml
            ./docs/book/src/cronjob-tutorial/testdata/project/.github/workflows/*.yml
            ./docs/book/src/multiversion-tutorial/testdata/project/.github/workflows/*.yml
            ./docs/book/src/getting-started/testdata/project/.github/workflows/*.yml
            ./pkg/plugins/golang/v4/scaffolds/internal/templates/github/*.go
            ./pkg/plugins/optional/autoupdate/v1alpha/scaffolds/internal/github/*.go
            ./pkg/plugins/optional/helm/*/scaffolds/internal/templates/github/*.go
            ./testdata/*/.github/workflows/*.yml
